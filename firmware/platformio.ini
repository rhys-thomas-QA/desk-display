; ESP32 240x320 ILI9341 desk display
; Adjust TFT_* pin defines below to match your specific board variant.
; Common CYD (ESP32-2432S028R) pins are used as defaults.

; ── Debug env: no display, all output to Serial ─────────────────────────────
[env:debug]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  bblanchon/ArduinoJson @ ^6.21.5
  tzapu/WiFiManager @ ^2.0.17

build_flags =
  -D NO_DISPLAY
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.34
  lvgl/lvgl @ ^8.3.11
  bblanchon/ArduinoJson @ ^6.21.5
  tzapu/WiFiManager @ ^2.0.17

build_flags =
  ; TFT_eSPI — define all display pins here, no User_Setup.h needed
  -D USER_SETUP_LOADED
  -D ILI9341_DRIVER
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=12
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D DISPLAY_TFT_ROTATION=2
  -D NAV_BUTTON_PIN=22
  -D WM_NODEBUG
  -D SPI_FREQUENCY=55000000
  -D SPI_READ_FREQUENCY=20000000
  ; LVGL
  -D LV_CONF_INCLUDE_SIMPLE
  -I include
